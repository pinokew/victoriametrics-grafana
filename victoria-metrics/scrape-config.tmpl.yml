global:
  scrape_interval: 15s

scrape_configs:
  - job_name: victoriametrics
    static_configs:
      - targets:
          - victoriametrics:8428
        labels:
          env: prod
          service: monitoring

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          env: prod
          service: host

  - job_name: cadvisor
    max_scrape_size: 64MB
    metric_relabel_configs:
      - action: labeldrop
        regex: container_label_traefik_http_.+
      - action: labeldrop
        regex: container_label_org_opencontainers_image_.+
      - action: labeldrop
        regex: container_label_org_label_schema_.+
    static_configs:
      - targets:
          - cadvisor:8081
        labels:
          env: prod
          service: host

  - job_name: mariadb-exporter
    static_configs:
      - targets:
          - mariadb-exporter:9104
        labels:
          env: prod
          service: koha
          component: db

  - job_name: matomo-mariadb-exporter
    static_configs:
      - targets:
          - matomo-mariadb-exporter:9104
        labels:
          env: prod
          service: matomo
          component: db

  - job_name: postgres-exporter
    static_configs:
      - targets:
          - postgres-exporter:9187
        labels:
          env: prod
          service: dspace
          component: db

  - job_name: traefik
    metrics_path: /metrics
    honor_labels: true
    static_configs:
      - targets:
          - traefik:8082
        labels:
          env: prod

  - job_name: cloudflare-tunnel
    metrics_path: /metrics
    static_configs:
      - targets:
          - __CLOUDFLARE_TUNNEL_METRICS_TARGET__
        labels:
          env: prod
          service: cloudflare
          component: tunnel
          tunnel: __CLOUDFLARE_TUNNEL_NAME__

  - job_name: blackbox-koha-opac
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - __KOHA_OPAC_URL__
        labels:
          env: prod
          service: koha
          website: opac
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: blackbox-koha-staff
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - __KOHA_STAFF_URL__
        labels:
          env: prod
          service: koha
          website: staff
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: blackbox-matomo
    metrics_path: /probe
    params:
      module:
        - http_tls
    static_configs:
      - targets:
          - __MATOMO_URL__
        labels:
          env: prod
          service: matomo
          website: analytics
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: blackbox-dspace-ui
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - __DSPACE_UI_URL__
        labels:
          env: prod
          service: dspace
          website: ui
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: blackbox-dspace-api
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - __DSPACE_API_URL__
        labels:
          env: prod
          service: dspace
          website: api
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
