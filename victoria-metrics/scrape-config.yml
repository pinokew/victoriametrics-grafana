global:
  scrape_interval: 15s

scrape_configs:
  - job_name: victoriametrics
    static_configs:
      - targets:
          - victoriametrics:8428
        labels:
          env: prod
          service: monitoring

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          env: prod
          service: host

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8081
        labels:
          env: prod
          service: host

  - job_name: mariadb-exporter
    static_configs:
      - targets:
          - mariadb-exporter:9104
        labels:
          env: prod
          service: koha
          component: db

  - job_name: postgres-exporter
    static_configs:
      - targets:
          - postgres-exporter:9187
        labels:
          env: prod
          service: dspace
          component: db

  - job_name: traefik
    metrics_path: /metrics
    static_configs:
      - targets:
          - traefik:8082
        labels:
          env: prod
          service: traefik
