global:
  scrape_interval: 15s

scrape_configs:
  - job_name: victoriametrics
    static_configs:
      - targets:
          - victoriametrics:8428
        labels:
          env: prod
          service: monitoring

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          env: prod
          service: host
