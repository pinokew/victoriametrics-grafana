name: Monitoring CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths:
      - docker-compose.yml
      - .env.example
      - scripts/check-internal-ports-policy.sh
      - scripts/*.sh
      - victoria-metrics/**
      - grafana/**
      - alerting/**
      - docs/deployment/monitoring-stack-deploy.md
      - .github/workflows/deploy-monitoring.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: monitoring-cd-${{ github.ref }}
  cancel-in-progress: false

env:
  SHELLCHECK_IMAGE: koalaman/shellcheck@sha256:61862eba1fcf09a484ebcc6feea46f1782532571a34ed51fedf90dd25f925a8d
  TRIVY_IMAGE: aquasec/trivy@sha256:3d1f862cb6c4fe13c1506f96f816096030d8d5ccdb2380a3069f7bf07daa86aa
  GITLEAKS_IMAGE: zricethezav/gitleaks:v8.24.2
  DEPLOY_BRANCH: main
  DEPLOY_COMPOSE_FILE: docker-compose.yml

jobs:
  security-gate:
    name: security-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Check internal ports policy
        shell: bash
        run: bash scripts/check-internal-ports-policy.sh

      - name: Pull CI utility images
        shell: bash
        run: |
          set -euo pipefail
          docker pull "${SHELLCHECK_IMAGE}"
          docker pull "${TRIVY_IMAGE}"
          docker pull "${GITLEAKS_IMAGE}"

      - name: Gitleaks scan (no secrets)
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD:/work" -w /work "${GITLEAKS_IMAGE}" \
            detect --source /work --no-git --redact --exit-code 1

      - name: Shellcheck scripts (koalaman/shellcheck)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find scripts -type f -name '*.sh' 2>/dev/null | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No shell scripts found in scripts/. Shellcheck step skipped."
            exit 0
          fi

          printf 'Shellcheck files:\n%s\n' "${files[@]}"
          docker run --rm -v "$PWD:/work" -w /work --entrypoint /bin/shellcheck \
            "${SHELLCHECK_IMAGE}" "${files[@]}"

      - name: Hadolint Dockerfiles
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t dockerfiles < <(find . -type f \( -name 'Dockerfile' -o -name 'Dockerfile.*' -o -name '*.Dockerfile' \) | sort)

          if [ "${#dockerfiles[@]}" -eq 0 ]; then
            echo "No Dockerfiles found. Hadolint step skipped."
            exit 0
          fi

          for dockerfile in "${dockerfiles[@]}"; do
            echo "Linting ${dockerfile}"
            docker run --rm -v "$PWD:/work" -w /work hadolint/hadolint hadolint "${dockerfile}"
          done

      - name: Trivy config scan (docker-compose, verbose logs)
        shell: bash
        run: |
          set -euo pipefail
          trivy_log="$(mktemp)"

          if ! docker run --rm -v "$PWD:/work" -w /work "${TRIVY_IMAGE}" \
            config --skip-check-update --exit-code 1 --severity CRITICAL,HIGH /work 2>&1 | tee "$trivy_log"; then
            echo "Trivy config scan failed. Full Trivy output follows:"
            cat "$trivy_log" || true
            exit 1
          fi

  cd-deploy:
    name: cd-deploy
    needs:
      - security-gate
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEPLOY_FULL_REF: ${{ github.ref }}
      DEPLOY_REF: ${{ github.ref_name }}
      DEPLOY_PROJECT_DIR: ${{ secrets.DEPLOY_PROJECT_DIR }}
      TAILSCALE_EPHEMERAL_AUTH_KEY: ${{ secrets.TAILSCALE_EPHEMERAL_AUTH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Validate deploy secrets
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${{ secrets.SERVER_HOST }}" ] || { echo "Missing secret: SERVER_HOST"; exit 1; }
          [ -n "${{ secrets.SERVER_USER }}" ] || { echo "Missing secret: SERVER_USER"; exit 1; }
          [ -n "${{ secrets.SERVER_SSH_KEY }}" ] || { echo "Missing secret: SERVER_SSH_KEY"; exit 1; }
          [ -n "${{ secrets.DEPLOY_PROJECT_DIR }}" ] || { echo "Missing secret: DEPLOY_PROJECT_DIR"; exit 1; }
          [ -n "${{ secrets.TAILSCALE_EPHEMERAL_AUTH_KEY }}" ] || { echo "Missing secret: TAILSCALE_EPHEMERAL_AUTH_KEY"; exit 1; }

      - name: Validate SemVer tag for production
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "Tag must follow SemVer: vMAJOR.MINOR.PATCH"
            exit 1
          }

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ env.TAILSCALE_EPHEMERAL_AUTH_KEY }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: DEPLOY_FULL_REF,DEPLOY_REF,DEPLOY_PROJECT_DIR,DEPLOY_BRANCH,DEPLOY_COMPOSE_FILE
          script: |
            set -euo pipefail

            echo "Starting monitoring deployment for ${DEPLOY_REF} (${DEPLOY_FULL_REF})"
            cd "${DEPLOY_PROJECT_DIR}"

            if [ ! -f .env ]; then
              echo "ERROR: .env not found in ${DEPLOY_PROJECT_DIR}."
              exit 1
            fi

            git fetch --prune --tags origin

            case "${DEPLOY_FULL_REF}" in
              refs/tags/*)
                echo "Deploying tag: ${DEPLOY_REF}"
                git checkout -f "${DEPLOY_REF}"
                ;;
              *)
                echo "Deploying branch: ${DEPLOY_BRANCH}"
                git checkout -f "${DEPLOY_BRANCH}"
                git reset --hard "origin/${DEPLOY_BRANCH}"
                ;;
            esac

            retry_cmd() {
              local description="$1"
              local attempts="$2"
              local delay_seconds="$3"
              shift 3

              local i
              for i in $(seq 1 "$attempts"); do
                echo "Running: ${description} (attempt ${i}/${attempts})"
                if "$@"; then
                  echo "Command succeeded: ${description}"
                  return 0
                fi

                if [ "$i" -lt "$attempts" ]; then
                  echo "Command failed: ${description}. Retrying in ${delay_seconds}s..."
                  sleep "$delay_seconds"
                fi
              done

              echo "ERROR: Command failed after ${attempts} attempts: ${description}"
              return 1
            }

            retry_cmd "docker compose pull" 4 20 docker compose -f "${DEPLOY_COMPOSE_FILE}" pull
            retry_cmd "docker compose up -d --remove-orphans" 3 15 docker compose -f "${DEPLOY_COMPOSE_FILE}" up -d --remove-orphans

            echo "---- docker compose ps ----"
            docker compose -f "${DEPLOY_COMPOSE_FILE}" ps

            echo "---- health checks ----"

            wait_for_http() {
              local name="$1"
              local url="$2"
              local attempts="$3"
              local delay_seconds="$4"

              local i
              for i in $(seq 1 "$attempts"); do
                if curl -fsS "$url"; then
                  echo
                  echo "Health check passed for ${name} (${url})"
                  return 0
                fi

                echo "Health check retry ${i}/${attempts} failed for ${name} (${url}); waiting ${delay_seconds}s"
                sleep "$delay_seconds"
              done

              echo "ERROR: Health check failed for ${name} after ${attempts} attempts: ${url}"
              return 1
            }

            wait_for_http "VictoriaMetrics" "http://127.0.0.1:8428/health" 12 5
            wait_for_http "Grafana" "http://127.0.0.1:3000/api/health" 18 5

            echo "---- targets checks ----"
            targets="$(curl -fsS http://127.0.0.1:8428/targets)"
            echo "$targets" | grep -q "job=node-exporter (1/1 up)"
            echo "$targets" | grep -q "job=victoriametrics (1/1 up)"

            echo "---- localhost-only ports ----"
            listeners="$(ss -tlnp | grep -E '8428|3000|9100' || true)"
            echo "$listeners"
            echo "$listeners" | grep -q "127.0.0.1:8428"
            echo "$listeners" | grep -q "127.0.0.1:3000"
            echo "$listeners" | grep -q "127.0.0.1:9100"

            echo "DEPLOY OK"
