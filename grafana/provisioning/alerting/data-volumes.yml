apiVersion: 1

groups:
  - orgId: 1
    name: data-volumes
    folder: KDI-P0
    interval: 1m
    rules:
      # Абсолютний поріг вільного місця для критичних data volume-ів.
      - uid: data-volumes-free-space-warning
        title: DataVolumesFreeSpaceWarning
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: victoriametrics
            model:
              datasource:
                type: prometheus
                uid: victoriametrics
              editorMode: code
              expr: (node_filesystem_avail_bytes{job="node-exporter",env="prod",service="host",mountpoint=~"/data|/data2",fstype="xfs"} / node_filesystem_size_bytes{job="node-exporter",env="prod",service="host",mountpoint=~"/data|/data2",fstype="xfs"}) * 100
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 15
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "Вільне місце на {{ $labels.mountpoint }} нижче 15%"
          description: "На {{ $labels.mountpoint }} ({{ $labels.fstype }}) залишилось менше 15% вільного місця. Поточне значення: {{ $values.A.Value }}%."
          runbook: docs/runbooks/disk-space-low.md
        labels:
          severity: warning
          env: prod
          service: host
          component: storage

      - uid: data-volumes-free-space-critical
        title: DataVolumesFreeSpaceCritical
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: victoriametrics
            model:
              datasource:
                type: prometheus
                uid: victoriametrics
              editorMode: code
              expr: (node_filesystem_avail_bytes{job="node-exporter",env="prod",service="host",mountpoint=~"/data|/data2",fstype="xfs"} / node_filesystem_size_bytes{job="node-exporter",env="prod",service="host",mountpoint=~"/data|/data2",fstype="xfs"}) * 100
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 5
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "Критично мало вільного місця на {{ $labels.mountpoint }}"
          description: "На {{ $labels.mountpoint }} ({{ $labels.fstype }}) залишилось менше 5% вільного місця. Поточне значення: {{ $values.A.Value }}%."
          runbook: docs/runbooks/disk-space-low.md
        labels:
          severity: critical
          env: prod
          service: host
          component: storage

      # Прогноз вичерпання місця за трендом останніх 24 годин.
      - uid: data-volumes-runout-predicted-warning
        title: DataVolumesRunoutPredictedWarning
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: victoriametrics
            model:
              datasource:
                type: prometheus
                uid: victoriametrics
              editorMode: code
              expr: predict_linear(node_filesystem_avail_bytes{job="node-exporter",env="prod",service="host",mountpoint=~"/data|/data2",fstype="xfs"}[24h], 345600)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 15m
        annotations:
          summary: "Прогнозоване вичерпання місця на {{ $labels.mountpoint }}"
          description: "{{ $labels.mountpoint }} може вичерпати вільне місце протягом наступних 4 днів за трендом останніх 24 годин. Прогноз вільних байтів через 4 дні: {{ $values.A.Value }}."
          runbook: docs/runbooks/disk-space-low.md
        labels:
          severity: warning
          env: prod
          service: host
          component: storage

      # Середня read latency на backing block devices vdb/vdc.
      - uid: data-volumes-read-latency-warning
        title: DataVolumesReadLatencyWarning
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: victoriametrics
            model:
              datasource:
                type: prometheus
                uid: victoriametrics
              editorMode: code
              expr: (rate(node_disk_read_time_seconds_total{job="node-exporter",env="prod",service="host",device=~"vdb|vdc"}[5m]) / rate(node_disk_reads_completed_total{job="node-exporter",env="prod",service="host",device=~"vdb|vdc"}[5m])) and rate(node_disk_reads_completed_total{job="node-exporter",env="prod",service="host",device=~"vdb|vdc"}[5m]) > 0
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.1
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "Висока read latency на {{ $labels.device }}"
          description: "Backing block device {{ $labels.device }} має середню read latency понад 100ms протягом 5 хвилин. Поточне значення: {{ $values.A.Value }}s."
          runbook: docs/runbooks/disk-space-low.md
        labels:
          severity: warning
          env: prod
          service: host
          component: storage

      # Середня write latency на backing block devices vdb/vdc.
      - uid: data-volumes-write-latency-warning
        title: DataVolumesWriteLatencyWarning
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: victoriametrics
            model:
              datasource:
                type: prometheus
                uid: victoriametrics
              editorMode: code
              expr: (rate(node_disk_write_time_seconds_total{job="node-exporter",env="prod",service="host",device=~"vdb|vdc"}[5m]) / rate(node_disk_writes_completed_total{job="node-exporter",env="prod",service="host",device=~"vdb|vdc"}[5m])) and rate(node_disk_writes_completed_total{job="node-exporter",env="prod",service="host",device=~"vdb|vdc"}[5m]) > 0
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.1
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "Висока write latency на {{ $labels.device }}"
          description: "Backing block device {{ $labels.device }} має середню write latency понад 100ms протягом 5 хвилин. Поточне значення: {{ $values.A.Value }}s."
          runbook: docs/runbooks/disk-space-low.md
        labels:
          severity: warning
          env: prod
          service: host
          component: storage
