apiVersion: 1

policies:
  - orgId: 1
    receiver: warning-email
    group_by:
      - alertname
      - severity
      - service
      - instance
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: critical-email-telegram
        object_matchers:
          - - severity
            - =
            - critical
        continue: false

      - receiver: warning-email
        object_matchers:
          - - severity
            - =
            - warning
        continue: false
