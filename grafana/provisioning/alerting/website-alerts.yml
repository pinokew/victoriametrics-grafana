apiVersion: 1

groups:
  - orgId: 1
    name: phase4-website-alerting
    folder: Alerting
    interval: 1m
    rules:
      - uid: website-down
        title: WebsiteDown
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 180
              to: 0
            datasourceUid: victoriametrics
            model:
              datasource:
                type: prometheus
                uid: victoriametrics
              editorMode: code
              expr: probe_success{job=~"blackbox-koha-opac|blackbox-koha-staff",env="prod",service="koha"}
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: Alerting
        execErrState: Error
        for: 2m
        annotations:
          summary: Website probe failed for koha-opac or koha-staff
          runbook: docs/runbooks/website-probe.md
        labels:
          severity: critical
          env: prod
          service: koha

      - uid: website-high-latency
        title: WebsiteHighLatency
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: victoriametrics
            model:
              datasource:
                type: prometheus
                uid: victoriametrics
              editorMode: code
              expr: probe_duration_seconds{job=~"blackbox-koha-opac|blackbox-koha-staff",env="prod",service="koha"}
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 2
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: Website probe latency is above 2 seconds
          runbook: docs/runbooks/website-probe.md
        labels:
          severity: warning
          env: prod
          service: koha
