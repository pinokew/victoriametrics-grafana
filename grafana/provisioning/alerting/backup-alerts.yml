apiVersion: 1

groups:
  - orgId: 1
    name: phase5-backup-restore-alerting
    folder: KDI-P0
    interval: 1m
    rules:
      - uid: vm-backup-stale
        title: VictoriaMetricsBackupStale
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 7200
              to: 0
            datasourceUid: victoriametrics
            model:
              datasource:
                type: prometheus
                uid: victoriametrics
              editorMode: code
              expr: (time() - kdi_vm_backup_last_success_timestamp_seconds{job="node-exporter",env="prod",exported_service="monitoring"}) > 93600
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: Alerting
        execErrState: Error
        for: 10m
        annotations:
          summary: VictoriaMetrics backup is stale (no successful backup in the last 26h)
          runbook: docs/runbooks/vm-backup-restore.md
        labels:
          severity: critical
          env: prod
          service: monitoring

      - uid: vm-restore-smoke-stale
        title: VictoriaMetricsRestoreSmokeStale
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 604800
              to: 0
            datasourceUid: victoriametrics
            model:
              datasource:
                type: prometheus
                uid: victoriametrics
              editorMode: code
              expr: (time() - kdi_vm_restore_smoke_last_success_timestamp_seconds{job="node-exporter",env="prod",exported_service="monitoring"}) > 691200
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: Alerting
        execErrState: Error
        for: 30m
        annotations:
          summary: VictoriaMetrics restore smoke test is stale (no successful test in the last 8d)
          runbook: docs/runbooks/vm-backup-restore.md
        labels:
          severity: warning
          env: prod
          service: monitoring
