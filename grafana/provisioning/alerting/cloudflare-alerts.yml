apiVersion: 1

groups:
  - orgId: 1
    name: phase4-cloudflare-tunnel-alerting
    folder: KDI-P0
    interval: 1m
    rules:
      - uid: cloudflare-tunnel-metrics-down
        title: CloudflareTunnelMetricsDown
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 180
              to: 0
            datasourceUid: victoriametrics
            model:
              datasource:
                type: prometheus
                uid: victoriametrics
              editorMode: code
              expr: up{job="cloudflare-tunnel",env="prod",service="cloudflare",component="tunnel"}
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: Alerting
        execErrState: Error
        for: 2m
        annotations:
          summary: Cloudflare Tunnel metrics endpoint is unavailable
          runbook: docs/runbooks/cloudflare-tunnel.md
        labels:
          severity: critical
          env: prod
          service: cloudflare
          component: tunnel

      - uid: cloudflare-tunnel-ha-connections-low
        title: CloudflareTunnelHAConnectionsLow
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: victoriametrics
            model:
              datasource:
                type: prometheus
                uid: victoriametrics
              editorMode: code
              expr: max by (tunnel, instance) (cloudflared_tunnel_ha_connections{job="cloudflare-tunnel",env="prod",service="cloudflare",component="tunnel"})
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 2
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: Cloudflare Tunnel has fewer than 2 HA connections
          runbook: docs/runbooks/cloudflare-tunnel.md
        labels:
          severity: warning
          env: prod
          service: cloudflare
          component: tunnel

      - uid: cloudflare-tunnel-request-errors-high
        title: CloudflareTunnelRequestErrorsHigh
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: victoriametrics
            model:
              datasource:
                type: prometheus
                uid: victoriametrics
              editorMode: code
              expr: (sum by (tunnel, instance) (rate(cloudflared_tunnel_request_errors{job="cloudflare-tunnel",env="prod",service="cloudflare",component="tunnel"}[5m])) / clamp_min(sum by (tunnel, instance) (rate(cloudflared_tunnel_total_requests{job="cloudflare-tunnel",env="prod",service="cloudflare",component="tunnel"}[5m])), 1)) * 100
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: Cloudflare Tunnel origin proxy error rate exceeded 1%
          runbook: docs/runbooks/cloudflare-tunnel.md
        labels:
          severity: warning
          env: prod
          service: cloudflare
          component: tunnel

      - uid: cloudflare-tunnel-quic-packet-loss-high
        title: CloudflareTunnelQUICPacketLossHigh
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: victoriametrics
            model:
              datasource:
                type: prometheus
                uid: victoriametrics
              editorMode: code
              expr: sum by (tunnel, instance) (rate(quic_client_lost_packets{job="cloudflare-tunnel",env="prod",service="cloudflare",component="tunnel"}[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: Cloudflare Tunnel QUIC lost packet rate exceeded 1 packet/sec
          runbook: docs/runbooks/cloudflare-tunnel.md
        labels:
          severity: warning
          env: prod
          service: cloudflare
          component: tunnel
