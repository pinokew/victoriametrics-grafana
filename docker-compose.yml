services:
  victoriametrics:
    image: ${VICTORIAMETRICS_IMAGE}
    container_name: victoriametrics
    restart: unless-stopped
    mem_limit: ${VM_MEMORY_LIMIT}
    memswap_limit: ${VM_MEMORY_SWAP_LIMIT}
    env_file:
      - .env
    command:
      - --storageDataPath=/storage
      - --retentionPeriod=${VM_RETENTION_PERIOD}
      - --promscrape.config=/etc/vm/${VM_SCRAPE_CONFIG_FILE}
      - --httpListenAddr=:${VM_INTERNAL_PORT}
      - --maxLabelsPerTimeseries=100
    ports:
      - "${MONITORING_BIND_IP}:${VM_HOST_PORT}:${VM_INTERNAL_PORT}"
    volumes:
      - ${VM_DATA_DIR}:/storage
      - ${VM_SCRAPE_CONFIG_PATH}:/etc/vm/${VM_SCRAPE_CONFIG_FILE}:ro
    networks:
      - monitoring_net
      - proxy-net

  node-exporter:
    image: ${NODE_EXPORTER_IMAGE}
    container_name: node-exporter
    restart: unless-stopped
    pid: "host"
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.textfile.directory=/vm-textfile-metrics
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|run($|/.*)|sys|var/lib/docker($|/.*)|var/lib/containers/storage($|/.*))
      - --web.listen-address=:${NODE_EXPORTER_INTERNAL_PORT}
    ports:
      - "${MONITORING_BIND_IP}:${NODE_EXPORTER_HOST_PORT}:${NODE_EXPORTER_INTERNAL_PORT}"
    volumes:
      - ${HOST_ROOTFS_PATH}:/host:ro,rslave
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - ${HOST_UDEV_PATH}:/run/udev:ro
      - ${NODE_EXPORTER_TEXTFILE_DIR:-./.data/node-exporter-textfile}:/vm-textfile-metrics:ro
    networks:
      - monitoring_net

  cadvisor:
    image: ${CADVISOR_IMAGE}
    container_name: cadvisor
    restart: unless-stopped
    pid: "host"
    cgroup: host
    privileged: true
    environment:
      CADVISOR_HEALTHCHECK_URL: http://localhost:${CADVISOR_INTERNAL_PORT}/healthz
    command:
      - --port=${CADVISOR_INTERNAL_PORT}
      - --housekeeping_interval=10s
      - --docker_only=true
      - --store_container_labels=true
    volumes:
      - ${HOST_ROOTFS_PATH}:/rootfs:ro
      - /var/run:/var/run:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    devices:
      - /dev/kmsg
    networks:
      - monitoring_net

  blackbox-exporter:
    image: ${BLACKBOX_EXPORTER_IMAGE:-quay.io/prometheus/blackbox-exporter:v0.25.0}
    container_name: blackbox-exporter
    restart: unless-stopped
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
      - --web.listen-address=:9115
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - monitoring_net

  mariadb-exporter:
    image: ${MARIADB_EXPORTER_IMAGE}
    container_name: mariadb-exporter
    restart: unless-stopped
    # profiles:
    #   - phase2-db
    env_file:
      - .env
    environment:
      MYSQLD_EXPORTER_PASSWORD: ${MARIADB_EXPORTER_PASSWORD}
    command:
      - --mysqld.address=${MARIADB_EXPORTER_TARGET}
      - --mysqld.username=${MARIADB_EXPORTER_USER}
      - --web.listen-address=:${MARIADB_EXPORTER_INTERNAL_PORT}
    ports:
      - "${MONITORING_BIND_IP}:${MARIADB_EXPORTER_HOST_PORT}:${MARIADB_EXPORTER_INTERNAL_PORT}"
    networks:
      - monitoring_net
      - kohanet

  postgres-exporter:
    image: ${POSTGRES_EXPORTER_IMAGE}
    container_name: postgres-exporter
    restart: unless-stopped
    # profiles:
    #   - phase2-db
    env_file:
      - .env
    environment:
      DATA_SOURCE_NAME: ${POSTGRES_EXPORTER_DSN}
    ports:
      - "${MONITORING_BIND_IP}:${POSTGRES_EXPORTER_HOST_PORT}:${POSTGRES_EXPORTER_INTERNAL_PORT}"
    networks:
      - monitoring_net
      - dspacenet

  grafana:
    image: ${GRAFANA_IMAGE}
    container_name: grafana
    user: "${GRAFANA_CONTAINER_USER}"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_AUTO_ASSIGN_ORG: "true"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: ${GRAFANA_AUTO_ASSIGN_ORG_ROLE:-Viewer}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SMTP_ENABLED: ${GRAFANA_SMTP_ENABLED:-false}
      GF_SMTP_HOST: ${MS365_SMTP_HOST:-}:${MS365_SMTP_PORT:-587}
      GF_SMTP_USER: ${MS365_SMTP_USER:-}
      GF_SMTP_PASSWORD: ${MS365_SMTP_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${MS365_ALERT_EMAIL_FROM:-}
      GF_SMTP_FROM_NAME: ${MS365_ALERT_FROM_NAME:-KDI Monitoring}
      VM_DATASOURCE_URL: ${VM_DATASOURCE_URL}
    depends_on:
      - victoriametrics
    ports:
      - "${MONITORING_BIND_IP}:${GRAFANA_HOST_PORT}:${GRAFANA_INTERNAL_PORT}"
    volumes:
      - ${GRAFANA_DATA_DIR}:/var/lib/grafana
      - ${GRAFANA_LOGS_DIR}:/var/log/grafana
      - ${GRAFANA_PROVISIONING_DIR}:/etc/grafana/provisioning:ro
      - ${GRAFANA_DASHBOARDS_DIR}:/var/lib/grafana/dashboards:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-net"
      - "traefik.http.routers.grafana.rule=Host(`${CLOUDFLARE_GRAFANA_HOSTNAME}`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.routers.grafana.service=grafana"
      - "traefik.http.services.grafana.loadbalancer.server.port=${GRAFANA_INTERNAL_PORT}"
    networks:
      - monitoring_net
      - proxy-net

networks:
  monitoring_net:
    name: ${MONITORING_NETWORK_NAME}
    driver: bridge
  kohanet:
    name: ${KOHANET_NETWORK_NAME}
    external: true
  dspacenet:
    name: ${DSPACENET_NETWORK_NAME}
    external: true
  proxy-net:
    name: ${PROXY_NET_NETWORK_NAME}
    external: true
