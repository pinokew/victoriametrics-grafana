groups:
  - name: phase4-databases
    interval: 1m
    rules:
      - alert: KohaMariaDBDown
        expr: (max(present_over_time(mysql_up{job="mariadb-exporter",env="prod",service="koha",component="db"}[2m])) or vector(0)) < 1 and on() (max(up{job="node-exporter",env="prod",service="host"}) == 1)
        for: 2m
        labels:
          severity: critical
          env: prod
          service: koha
          component: db
        annotations:
          summary: Koha MariaDB exporter metrics are absent for 2 minutes
          runbook: docs/runbooks/monitoring-down.md

      - alert: KohaMariaDBConnectionsHigh
        expr: ((mysql_global_status_threads_connected{job="mariadb-exporter",env="prod",service="koha",component="db"} / mysql_global_variables_max_connections{job="mariadb-exporter",env="prod",service="koha",component="db"}) * 100) > 90 and on() (max(up{job="node-exporter",env="prod",service="host"}) == 1)
        for: 5m
        labels:
          severity: critical
          env: prod
          service: koha
          component: db
        annotations:
          summary: Koha MariaDB connections exceeded 90% of max_connections
          runbook: docs/runbooks/database-connections-high.md

      - alert: MatomoMariaDBDown
        expr: (max(present_over_time(mysql_up{job="matomo-mariadb-exporter",env="prod",service="matomo",component="db"}[2m])) or vector(0)) < 1 and on() (max(up{job="node-exporter",env="prod",service="host"}) == 1)
        for: 2m
        labels:
          severity: critical
          env: prod
          service: matomo
          component: db
        annotations:
          summary: Matomo MariaDB exporter metrics are absent for 2 minutes
          runbook: docs/runbooks/monitoring-down.md

      - alert: MatomoMariaDBConnectionsHigh
        expr: ((mysql_global_status_threads_connected{job="matomo-mariadb-exporter",env="prod",service="matomo",component="db"} / mysql_global_variables_max_connections{job="matomo-mariadb-exporter",env="prod",service="matomo",component="db"}) * 100) > 90 and on() (max(up{job="node-exporter",env="prod",service="host"}) == 1)
        for: 5m
        labels:
          severity: critical
          env: prod
          service: matomo
          component: db
        annotations:
          summary: Matomo MariaDB connections exceeded 90% of max_connections
          runbook: docs/runbooks/database-connections-high.md

      - alert: PostgreSQLDown
        expr: (max(present_over_time(pg_up{job="postgres-exporter",env="prod",service="dspace",component="db"}[2m])) or vector(0)) < 1 and on() (max(up{job="node-exporter",env="prod",service="host"}) == 1)
        for: 2m
        labels:
          severity: critical
          env: prod
          service: dspace
          component: db
        annotations:
          summary: PostgreSQL exporter metrics are absent for 2 minutes
          runbook: docs/runbooks/monitoring-down.md

      - alert: PostgreSQLConnectionsHigh
        expr: ((sum by(instance) (pg_stat_database_numbackends{job="postgres-exporter",env="prod",service="dspace",component="db"}) / max by(instance) (pg_settings_max_connections{job="postgres-exporter",env="prod",service="dspace",component="db"})) * 100) > 90 and on() (max(up{job="node-exporter",env="prod",service="host"}) == 1)
        for: 5m
        labels:
          severity: critical
          env: prod
          service: dspace
          component: db
        annotations:
          summary: PostgreSQL connections exceeded 90% of max_connections
          runbook: docs/runbooks/database-connections-high.md
