groups:
  - name: phase4-cloudflare-tunnel
    interval: 1m
    rules:
      - alert: CloudflareTunnelMetricsDown
        expr: up{job="cloudflare-tunnel",env="prod",service="cloudflare",component="tunnel"} < 1
        for: 2m
        labels:
          severity: critical
          env: prod
          service: cloudflare
          component: tunnel
        annotations:
          summary: Cloudflare Tunnel metrics endpoint is unavailable
          runbook: docs/runbooks/cloudflare-tunnel.md

      - alert: CloudflareTunnelHAConnectionsLow
        expr: max by (tunnel, instance) (cloudflared_tunnel_ha_connections{job="cloudflare-tunnel",env="prod",service="cloudflare",component="tunnel"}) < 2
        for: 5m
        labels:
          severity: warning
          env: prod
          service: cloudflare
          component: tunnel
        annotations:
          summary: Cloudflare Tunnel has fewer than 2 HA connections
          runbook: docs/runbooks/cloudflare-tunnel.md

      - alert: CloudflareTunnelRequestErrorsHigh
        expr: (sum by (tunnel, instance) (rate(cloudflared_tunnel_request_errors{job="cloudflare-tunnel",env="prod",service="cloudflare",component="tunnel"}[5m])) / clamp_min(sum by (tunnel, instance) (rate(cloudflared_tunnel_total_requests{job="cloudflare-tunnel",env="prod",service="cloudflare",component="tunnel"}[5m])), 1)) * 100 > 1
        for: 5m
        labels:
          severity: warning
          env: prod
          service: cloudflare
          component: tunnel
        annotations:
          summary: Cloudflare Tunnel origin proxy error rate exceeded 1%
          runbook: docs/runbooks/cloudflare-tunnel.md

      - alert: CloudflareTunnelQUICPacketLossHigh
        expr: sum by (tunnel, instance) (rate(quic_client_lost_packets{job="cloudflare-tunnel",env="prod",service="cloudflare",component="tunnel"}[5m])) > 1
        for: 5m
        labels:
          severity: warning
          env: prod
          service: cloudflare
          component: tunnel
        annotations:
          summary: Cloudflare Tunnel QUIC lost packet rate exceeded 1 packet/sec
          runbook: docs/runbooks/cloudflare-tunnel.md
